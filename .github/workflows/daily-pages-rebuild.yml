name: Daily Pages Rebuild

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy hook secret
        run: |
          if [ -z "$CLOUDFLARE_PAGES_DEPLOY_HOOK" ]; then
            echo "::error::Missing secret CLOUDFLARE_PAGES_DEPLOY_HOOK"
            exit 1
          fi
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}

      - name: Trigger Cloudflare Pages Deploy Hook
        run: curl --fail-with-body -X POST "$CLOUDFLARE_PAGES_DEPLOY_HOOK"
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
